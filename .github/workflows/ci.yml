name: CI & Deploy

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Validation runs on GitHub-hosted runners (NOT the Pi) so that pull requests
  # — including any future fork PRs — never execute on the self-hosted runner.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install mpv
        # The server spawns mpv at startup to drive audio. Newer code can skip it
        # via STAGE_NO_AUDIO, but installing it keeps the smoke test green against
        # any revision (and mirrors the Pi more closely).
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends mpv

      - name: Syntax-check the server
        run: node --check server.js

      - name: Boot smoke test
        # Assert the HTTP server actually answers. STAGE_NO_AUDIO skips mpv on
        # code that supports it; a temp state file keeps the repo clean. The
        # server listens on 3000 by default on every revision.
        run: |
          set -euo pipefail
          STATE=$(mktemp)
          STAGE_NO_AUDIO=1 STAGE_STATE_FILE="$STATE" node server.js &
          PID=$!
          ok=
          for _ in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:3000/ >/dev/null 2>&1; then ok=1; break; fi
            sleep 0.5
          done
          kill "$PID" 2>/dev/null || true
          rm -f "$STATE"
          if [ -z "$ok" ]; then echo "server did not answer on :3000"; exit 1; fi
          echo "boot smoke test OK"

      - name: Behaviour smoke suite
        # Zero-dep harness (node:test) that boots the server and pins the
        # load-bearing behaviours — event join-gating, lifecycle/playback guard,
        # vote-ranked fair queue, idempotent vote toggle, spotlight archival —
        # so a refactor that breaks one turns CI red. STAGE_NO_AUDIO skips mpv.
        run: STAGE_NO_AUDIO=1 node test/smoke.js

      - name: Reader unit tests
        # The Reader (reader.js) — agentic-Claude repo read. These pin the pure,
        # deterministic logic (defensive JSON parse, the ANTHROPIC_API_KEY cost
        # assertion, the clean-env allowlist, path-escape rejection, size cap,
        # timeout->SIGKILL via a FAKE claude binary, temp-dir wipe, concurrency).
        # CI CANNOT run real `claude`; the live-model gate is an on-Pi observation
        # run by hand (see the PR description). Zero-dep node:test.
        #
        # STAGE_READER_UNSAFE_DIRECT=1: the OS sandbox is ON BY DEFAULT (fail-safe),
        # but CI has no sandbox installed (no stage-reader user / no sudoers rule),
        # so it takes the explicit direct-spawn opt-out. The tests that exercise
        # the sandbox PATH set their own env per-test; this default keeps the
        # direct-mode tests off the (absent) sudo wrapper.
        run: STAGE_READER_UNSAFE_DIRECT=1 node --test test/reader.test.js

  # Deploy runs ONLY on push to main (i.e. after a PR merges) AND only if
  # validation passed — so untrusted PR code never reaches the Pi, and broken
  # code never gets deployed.
  deploy:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, pi]
    # Never let two deploys race on the appliance (scoped to this job so it
    # doesn't serialize unrelated PR validations).
    concurrency:
      group: pi-deploy
      cancel-in-progress: false
    steps:
      - name: Sync main to ~/stage and restart services
        # No actions/checkout: we deploy into ~/stage on the Pi, not the runner
        # workspace. The server has zero npm deps, so there's nothing to build.
        run: |
          set -euo pipefail
          # The runner is a user systemd service, so the user manager is reachable.
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          STAGE="$HOME/stage"
          REPO="https://github.com/imagineering-cc/stage.git"

          # Initialize ~/stage as a git checkout IN PLACE on first run. This is
          # deliberately non-destructive: `git reset --hard` only overwrites
          # tracked paths, so untracked runtime files (stage-state.json,
          # ops/network.local.md) are preserved. An earlier version rm -rf'd the
          # directory and lost the untracked launch-kiosk.sh — never again.
          if [ ! -d "$STAGE/.git" ]; then
            echo "First deploy — initializing $STAGE as a git checkout in place"
            mkdir -p "$STAGE"
            git -C "$STAGE" init -q
            git -C "$STAGE" remote add origin "$REPO" 2>/dev/null \
              || git -C "$STAGE" remote set-url origin "$REPO"
          fi
          git -C "$STAGE" fetch --depth 1 origin main
          git -C "$STAGE" reset --hard origin/main

          echo "Deployed $(git -C "$STAGE" rev-parse --short HEAD)"

          # Restart the server (mandatory) and refresh the TV kiosk (best-effort).
          systemctl --user restart stage-server.service
          systemctl --user restart stage-kiosk.service || echo "kiosk restart skipped"

          sleep 2
          if systemctl --user is-active --quiet stage-server.service; then
            echo "stage-server active after deploy ✓"
          else
            echo "stage-server is NOT active after deploy"; exit 1
          fi
