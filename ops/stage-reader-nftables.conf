#!/usr/sbin/nft -f
#
# stage-reader-nftables.conf — egress filter for The Reader's contained `claude`.
#
# DEFENSE IN DEPTH. The contained claude has NO Bash/WebFetch/WebSearch tool, so
# it should never make a network call of its own — the only legitimate traffic is
# the Claude API over HTTPS. This ruleset restricts the `stage-reader` UID's
# OUTBOUND traffic to exactly that (HTTPS/443 + DNS), and DROPS everything else,
# so a hypothetical claude-CLI compromise that DID try to open a socket cannot
# exfiltrate over an arbitrary port/protocol.
#
# SCOPE — by UID, not by interface. The `meta skuid stage-reader` match means
# this ONLY governs traffic from processes running as stage-reader. The
# stage-server's own work — `git clone` (HTTPS to github), yt-dlp, OpenAlex,
# Tailscale — all runs as `nick` and is COMPLETELY UNAFFECTED. We add to a
# dedicated table so we never touch the host's existing firewall/Tailscale rules.
#
# Load (root):   sudo nft -f /home/nick/stage/ops/stage-reader-nftables.conf
# Inspect:       sudo nft list table inet stage_reader
# Remove:        sudo nft delete table inet stage_reader
# Persist across reboot: install-reader-sandbox.sh copies this to
#                /etc/nftables.d/ (sourced by the nftables.service if enabled) or
#                you can append an `include` to /etc/nftables.conf — see
#                ops/reader-sandbox.md.
#
# IMPORTANT: this is an ADDITIVE table in its own namespace. `flush table` below
# only clears OUR table on reload (idempotent), never the host's other tables.

table inet stage_reader {
	chain output {
		# Only hook our own table's output path; base-policy accept so we never
		# affect anyone else. We selectively DROP stage-reader's stray egress.
		type filter hook output priority 0; policy accept;

		# Everything below is scoped to the stage-reader UID. Traffic from any
		# other user falls straight through (returns) untouched.
		meta skuid != stage-reader return

		# --- stage-reader UID from here down ---

		# Allow loopback (claude talks to nothing local today, but a future
		# unix-socket helper shouldn't be silently broken; AF_UNIX is already
		# permitted in the systemd cage).
		oifname "lo" accept

		# Allow replies on connections we initiated.
		ct state established,related accept

		# DNS — resolve api.anthropic.com. Both UDP and TCP/53.
		udp dport 53 accept
		tcp dport 53 accept

		# HTTPS — the Claude API. This is the ONLY application egress claude needs.
		tcp dport 443 accept

		# Anything else from stage-reader is unexpected → drop and log (rate-
		# limited so a loop can't flood the journal).
		limit rate 5/minute log prefix "stage-reader-egress-drop: " level warn
		drop
	}
}
